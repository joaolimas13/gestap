<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Print Manager — Cari Cartoon 3D</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { font-family: 'DM Sans', system-ui, sans-serif; box-sizing: border-box; }
  body { background: #0c101a; margin: 0; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: #0f1319; }
  ::-webkit-scrollbar-thumb { background: #2a3045; border-radius: 3px; }
  .ic { width:100%; background:#1a1f2e; border:1px solid #2a3045; border-radius:8px; padding:8px 12px; color:white; font-size:14px; outline:none; transition:border-color 0.15s; }
  .ic:focus { border-color:#7c3aed; box-shadow:0 0 0 2px rgba(124,58,237,0.2); }
  .ic::placeholder { color:#4b5563; }
  select.ic option { background:#1a1f2e; }
  .modal-overlay { position:fixed;inset:0;background:rgba(0,0,0,0.75);backdrop-filter:blur(4px);z-index:50;display:flex;align-items:center;justify-content:center;padding:16px; }
  .modal-box { background:#151926;border:1px solid #2a3045;border-radius:16px;width:100%;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 25px 50px rgba(0,0,0,0.6); }
  .hidden { display:none !important; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
  .pulse { animation:pulse 1.5s ease-in-out infinite; }
  tr:hover .row-actions { opacity:1 !important; }
  .row-actions { opacity:0; transition:opacity 0.15s; }
  .stat-card { position:relative;overflow:hidden;border-radius:16px;border:1px solid rgba(255,255,255,0.05);padding:20px;background:linear-gradient(135deg,#151926 0%,#1a1f2e 100%); }
  .stat-card .bg-gradient { position:absolute;inset:0;opacity:0.18; }
  .badge-s { display:inline-flex;align-items:center;gap:5px;padding:2px 10px;border-radius:9999px;font-size:11px;font-weight:600; }
  @keyframes slideUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
  .animate-in { animation:slideUp 0.3s ease-out both; }
  .tab-active { background:rgba(124,58,237,0.9)!important; color:white!important; }
  .tab-inactive { color:#6b7280; }
  .tab-inactive:hover { background:#1a1f2e; color:#d1d5db; }
  .progress-bar { height:6px;border-radius:3px;background:#1e2535;overflow:hidden; }
  .progress-fill { height:100%;border-radius:3px;transition:width 0.5s ease; }
</style>
</head>
<body class="text-gray-100 overflow-hidden h-screen">

<div id="loading" class="flex items-center justify-center h-screen">
  <div class="text-center">
    <div class="text-5xl mb-4 pulse">🖨️</div>
    <p class="text-gray-600 text-sm">Carregando seus dados...</p>
  </div>
</div>

<div id="app" style="display:none" class="h-screen overflow-hidden">
  <!-- SIDEBAR -->
  <aside class="w-52 bg-[#0f1319] border-r border-[#1a1f2e] flex flex-col flex-shrink-0">
    <div class="px-4 py-5 border-b border-[#1a1f2e]">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 rounded-xl bg-violet-600/20 border border-violet-500/30 flex items-center justify-center text-lg">🖨️</div>
        <div>
          <p class="font-bold text-white text-sm tracking-tight">Print Manager</p>
          <p class="text-xs text-gray-600">Cari Cartoon 3D</p>
        </div>
      </div>
    </div>
    <nav class="flex-1 p-3 space-y-0.5" id="nav">
      <button data-tab="dashboard"    class="nav-btn w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-all"><i data-lucide="home" class="w-4 h-4"></i><span class="flex-1 text-left">Dashboard</span></button>
      <button data-tab="orders"       class="nav-btn w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-all"><i data-lucide="package" class="w-4 h-4"></i><span class="flex-1 text-left">Pedidos</span><span id="orders-badge" class="hidden bg-red-500 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center font-bold"></span></button>
      <button data-tab="clients"      class="nav-btn w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-all"><i data-lucide="users" class="w-4 h-4"></i><span class="flex-1 text-left">Clientes</span></button>
      <button data-tab="consignacao"  class="nav-btn w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-all"><i data-lucide="store" class="w-4 h-4"></i><span class="flex-1 text-left">Consignação</span></button>
      <button data-tab="materials"    class="nav-btn w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-all"><i data-lucide="box" class="w-4 h-4"></i><span class="flex-1 text-left">Materiais</span></button>
      <div class="my-1 border-t border-[#1a1f2e]"></div>
      <button data-tab="gastos"       class="nav-btn w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-all"><i data-lucide="credit-card" class="w-4 h-4"></i><span class="flex-1 text-left">Gastos</span></button>
      <button data-tab="financeiro"   class="nav-btn w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-all"><i data-lucide="bar-chart-2" class="w-4 h-4"></i><span class="flex-1 text-left">Financeiro</span></button>
      <button data-tab="settings"     class="nav-btn w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-all"><i data-lucide="settings" class="w-4 h-4"></i><span class="flex-1 text-left">Config.</span></button>
    </nav>
    <div class="p-4 border-t border-[#1a1f2e] space-y-1">
      <p class="text-xs text-gray-700" id="sidebar-active-count">0 pedidos ativos</p>
      <p class="text-xs text-gray-700" id="sidebar-consign-count">0 em consignação</p>
    </div>
  </aside>

  <main class="flex-1 overflow-auto bg-[#0c101a]" id="main-content"></main>
</div>

<div id="modal" class="modal-overlay hidden">
  <div class="modal-box" id="modal-box" style="max-width:600px">
    <div class="flex items-center justify-between px-6 py-4 border-b border-[#2a3045] flex-shrink-0">
      <h2 class="font-bold text-white text-sm tracking-wide uppercase" id="modal-title"></h2>
      <button onclick="closeModal()" class="text-gray-500 hover:text-white p-1.5 rounded-lg hover:bg-white/5 transition"><i data-lucide="x" class="w-4 h-4"></i></button>
    </div>
    <div class="overflow-y-auto p-6 flex-1" id="modal-body"></div>
  </div>
</div>

<script>
// ── CONSTANTS ──────────────────────────────────────────────────────────────────
const SK = { o:'imp3d_orders', c:'imp3d_clients', m:'imp3d_materials', s:'imp3d_settings', e:'imp3d_expenses', cs:'imp3d_consign' };
const DEF_SETTINGS = { filamentPerGram:80, electricityPerHour:0.50, laborPerHour:25, defaultMargin:30, metaSemanal:1000 };
const DEF_MATERIALS = [
  {id:'m1',name:'PLA',    type:'PLA',   pricePerGram:120},
  {id:'m2',name:'PETG',   type:'PETG',  pricePerGram:100},
  {id:'m3',name:'ABS',    type:'ABS',   pricePerGram:90},
  {id:'m4',name:'Resina', type:'Resina',pricePerGram:150},
  {id:'m5',name:'TPU',    type:'TPU',   pricePerGram:120},
];
const STATUS_MAP = {
  aguardando:{label:'Aguardando',  bg:'rgba(245,158,11,0.15)', color:'#f59e0b',dot:'#f59e0b'},
  imprimindo: {label:'Em Impressão',bg:'rgba(56,189,248,0.15)',color:'#38bdf8',dot:'#38bdf8'},
  impresso:   {label:'Impresso',   bg:'rgba(167,139,250,0.15)',color:'#a78bfa',dot:'#a78bfa'},
  entregue:   {label:'Entregue',   bg:'rgba(52,211,153,0.15)', color:'#34d399',dot:'#34d399'},
};
const PAY_METHODS = {pix:'Pix',cartao:'Cartão',entrada50:'50% + 50%',parcelado:'Parcelado',dinheiro:'Dinheiro'};
const PAY_STATUS_MAP = {
  pendente:{label:'Pendente',     color:'#f87171'},
  parcial: {label:'Entrada Paga', color:'#fbbf24'},
  pago:    {label:'Pago',         color:'#34d399'},
};
const TIPO_VENDA = {
  individual: {label:'Individual', bg:'rgba(124,58,237,0.15)', color:'#a78bfa'},
  b2b:        {label:'B2B / Atacado', bg:'rgba(56,189,248,0.15)', color:'#38bdf8'},
  evento:     {label:'Evento', bg:'rgba(245,158,11,0.15)', color:'#f59e0b'},
  consignacao:{label:'Consignação', bg:'rgba(52,211,153,0.15)', color:'#34d399'},
};
const EXPENSE_CATS = ['Filamento','Equipamento','Manutenção','Embalagem','Marketing','Software','Infraestrutura','Transporte','Outros'];
const EXPENSE_ICONS = {Filamento:'🧵',Equipamento:'🖨️',Manutenção:'🔧',Embalagem:'📦',Marketing:'📣',Software:'💻',Infraestrutura:'🏠',Transporte:'🚗',Outros:'📋'};
const CONSIGN_STATUS = {ativo:{label:'Ativo',color:'#38bdf8'},encerrado:{label:'Encerrado',color:'#6b7280'}};
const MONTHS = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
const MAT_TYPES = ['PLA','PETG','ABS','Resina','TPU','ASA','Nylon','HIPS','Outro'];

// ── STATE ──────────────────────────────────────────────────────────────────────
let state = { orders:[], clients:[], materials:DEF_MATERIALS, settings:DEF_SETTINGS, expenses:[], consignment:[] };
let currentTab = 'dashboard';
let charts = {};

// ── STORAGE ────────────────────────────────────────────────────────────────────
function stLoad(key, def) { try{const v=localStorage.getItem(key);return v?JSON.parse(v):def;}catch{return def;} }
function stSave(key, val) { try{localStorage.setItem(key,JSON.stringify(val));}catch{} }
function saveAll() { stSave(SK.o,state.orders);stSave(SK.c,state.clients);stSave(SK.m,state.materials);stSave(SK.s,state.settings);stSave(SK.e,state.expenses);stSave(SK.cs,state.consignment); }

// ── HELPERS ────────────────────────────────────────────────────────────────────
const fmt   = v => new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(v||0);
const fmtD  = d => d?new Date(d+'T12:00:00').toLocaleDateString('pt-BR'):'—';
const r2    = v => Math.round((v||0)*100)/100;
const genId = () => Math.random().toString(36).substr(2,9);
const today = () => new Date().toISOString().split('T')[0];
const esc   = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function badge(type, map) {
  const c=map[type]||{label:type,bg:'rgba(107,114,128,0.3)',color:'#9ca3af',dot:'#9ca3af'};
  return `<span class="badge-s" style="background:${c.bg};color:${c.color}"><span style="width:6px;height:6px;border-radius:50%;background:${c.dot};display:inline-block"></span>${esc(c.label)}</span>`;
}
function calcOrderProfit(o) {
  if(!o.custoEstimado||!o.salePrice) return null;
  const p=r2(+o.salePrice-+o.custoEstimado);
  const m=r2((p/+o.salePrice)*100);
  return {profit:p, margin:m};
}
function nextStatus(current) {
  const order=['aguardando','imprimindo','impresso','entregue'];
  const i=order.indexOf(current);
  return order[(i+1)%order.length];
}
function quickStatus(id) {
  const i=state.orders.findIndex(o=>o.id===id);
  if(i<0)return;
  state.orders[i].status=nextStatus(state.orders[i].status);
  saveAll();setTab('orders');
}
function copyOrder(id) {
  const o=state.orders.find(x=>x.id===id);
  if(!o)return;
  const copy={...o,id:genId(),createdAt:today(),status:'aguardando',paymentStatus:'pendente',deadline:''};
  state.orders=[copy,...state.orders];
  saveAll();setTab('orders');
}
function exportOrdersCSV() {
  const headers=['Descrição','Cliente','Tipo','Status','Prazo','Preço','Custo Est.','Lucro','Pagamento','Status Pag.','Data'];
  const rows=state.orders.map(o=>{
    const lp=calcOrderProfit(o);
    return [
      o.description,o.clientName||'',TIPO_VENDA[o.tipoVenda||'individual']?.label||'',
      STATUS_MAP[o.status]?.label||o.status,o.deadline||'',
      (o.salePrice||0).toFixed(2),(o.custoEstimado||''),lp?lp.profit.toFixed(2):'',
      PAY_METHODS[o.paymentMethod]||'',PAY_STATUS_MAP[o.paymentStatus]?.label||'',o.createdAt||''
    ].map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',');
  });
  const csv=[headers.join(','),...rows].join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'}));
  a.download=`pedidos-caricartoon-${today()}.csv`;a.click();
}
  const now=new Date();
  return state.orders.filter(o=>{if(o.status==='entregue'||!o.deadline)return false;return(new Date(o.deadline+'T12:00:00')-now)/86400000<=2;});
}

// Monthly helpers
function getMonthOrders(date) {
  return state.orders.filter(o=>{
    const d=new Date((o.createdAt||today())+'T12:00:00');
    return d.getMonth()===date.getMonth()&&d.getFullYear()===date.getFullYear();
  });
}
function getMonthExpenses(date) {
  return state.expenses.filter(e=>{
    const d=new Date((e.date||today())+'T12:00:00');
    return d.getMonth()===date.getMonth()&&d.getFullYear()===date.getFullYear();
  });
}

// ── CHART HELPERS ─────────────────────────────────────────────────────────────
function destroyChart(id){if(charts[id]){charts[id].destroy();delete charts[id];}}
function chartDefaults(){return{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#6b7280',font:{size:11},usePointStyle:true,pointStyle:'circle'}}},scales:{x:{ticks:{color:'#4b5563',font:{size:11}},grid:{color:'#1e2535'},border:{display:false}},y:{ticks:{color:'#4b5563',font:{size:10},callback:v=>v>=1000?`${(v/1e3).toFixed(1)}k`:v},grid:{color:'#1e2535'},border:{display:false}}}};}
function makeBarChart(id,labels,datasets){destroyChart(id);const ctx=document.getElementById(id);if(!ctx)return;charts[id]=new Chart(ctx,{type:'bar',data:{labels,datasets},options:chartDefaults()});}
function makeLineChart(id,labels,datasets){destroyChart(id);const ctx=document.getElementById(id);if(!ctx)return;charts[id]=new Chart(ctx,{type:'line',data:{labels,datasets},options:chartDefaults()});}

// ── NAVIGATION ────────────────────────────────────────────────────────────────
function setTab(tab) {
  currentTab=tab;
  document.querySelectorAll('.nav-btn').forEach(b=>{
    b.className=`nav-btn w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-all ${b.dataset.tab===tab?'bg-violet-600/90 text-white shadow-lg shadow-violet-900/30':'text-gray-500 hover:bg-[#1a1f2e] hover:text-gray-300'}`;
  });
  const alerts=getAlerts();
  const be=document.getElementById('orders-badge');
  if(alerts.length>0){be.classList.remove('hidden');be.textContent=alerts.length;}else be.classList.add('hidden');
  const active=state.orders.filter(o=>o.status!=='entregue').length;
  document.getElementById('sidebar-active-count').textContent=`${active} pedido(s) ativo(s)`;
  const consignAtivos=state.consignment.filter(c=>c.status==='ativo').length;
  document.getElementById('sidebar-consign-count').textContent=`${consignAtivos} local(is) em consign.`;
  Object.keys(charts).forEach(destroyChart);
  const main=document.getElementById('main-content');
  if(tab==='dashboard')    renderDashboard(main);
  else if(tab==='orders')       renderOrders(main);
  else if(tab==='clients')      renderClients(main);
  else if(tab==='consignacao')  renderConsignacao(main);
  else if(tab==='materials')    renderMaterials(main);
  else if(tab==='gastos')       renderGastos(main);
  else if(tab==='financeiro')   renderFinanceiro(main);
  else if(tab==='settings')     renderSettings(main);
  lucide.createIcons();
}

// ── DASHBOARD ─────────────────────────────────────────────────────────────────
function renderDashboard(main) {
  const now=new Date();
  const thisMonthO=getMonthOrders(now);
  const delivered=thisMonthO.filter(o=>o.status==='entregue');
  const revenue=delivered.reduce((s,o)=>s+(o.salePrice||0),0);
  const thisMonthExp=getMonthExpenses(now);
  const expenses=thisMonthExp.reduce((s,e)=>s+(e.amount||0),0);
  const netProfit=r2(revenue-expenses); // Lucro real = Faturamento − Gastos (custo de produção entra pelos Gastos)
  const b2bRev=delivered.filter(o=>o.tipoVenda==='b2b'||o.tipoVenda==='evento').reduce((s,o)=>s+(o.salePrice||0),0);
  const indRev=revenue-b2bRev;
  const active=state.orders.filter(o=>o.status!=='entregue').length;
  const consignPending=state.consignment.filter(c=>c.status==='ativo').reduce((s,c)=>s+((+c.quantitySent-(+c.quantitySold||0))*+(c.yourPricePerUnit||0)),0);
  const alerts=getAlerts();
  const meta=state.settings.metaSemanal||1000;

  // Weekly revenue (current week)
  const startOfWeek=new Date(now); startOfWeek.setDate(now.getDate()-now.getDay());
  const weekRevenue=state.orders.filter(o=>{
    const d=new Date((o.createdAt||today())+'T12:00:00');
    return d>=startOfWeek&&o.status==='entregue';
  }).reduce((s,o)=>s+(o.salePrice||0),0);
  const metaPct=Math.min(100,r2((weekRevenue/meta)*100));

  const chartData=Array.from({length:6},(_,i)=>{
    const d=new Date(now.getFullYear(),now.getMonth()-(5-i),1);
    const mo=getMonthOrders(d).filter(o=>o.status==='entregue');
    const exps=getMonthExpenses(d);
    const fat=r2(mo.reduce((s,o)=>s+(o.salePrice||0),0));
    const gas=r2(exps.reduce((s,e)=>s+(e.amount||0),0));
    return {name:MONTHS[d.getMonth()],fat,gas,liq:r2(fat-gas)};
  });

  const recent=[...state.orders].sort((a,b)=>new Date(b.createdAt||0)-new Date(a.createdAt||0)).slice(0,5);

  const alertsHTML=alerts.length>0?`<div class="mx-6 mt-4 bg-red-400/5 border border-red-400/20 rounded-xl p-4">
    <p class="text-xs font-bold text-red-400 uppercase tracking-widest flex items-center gap-2 mb-2"><i data-lucide="bell" class="w-3 h-3"></i>${alerts.length} pedido(s) com prazo próximo</p>
    ${alerts.map(a=>`<div class="flex items-center text-sm text-gray-400 gap-2 mt-1"><i data-lucide="chevron-right" class="w-3 h-3 text-red-400 flex-shrink-0"></i><span class="font-semibold text-white">${esc(a.description)}</span><span class="ml-auto text-red-300 text-xs">${fmtD(a.deadline)}</span></div>`).join('')}
  </div>`:'';

  const recentHTML=recent.length===0?'<p class="text-sm text-gray-600">Nenhum pedido ainda</p>':
    recent.map(o=>`<div class="flex items-start gap-3 py-2 border-b border-[#1e2535] last:border-0">
      <div class="flex-1 min-w-0"><p class="text-sm font-medium text-white truncate">${esc(o.description)}</p><p class="text-xs text-gray-600">${esc(o.clientName||'Sem cliente')}</p></div>
      <div class="text-right"><p class="text-sm font-bold text-white">${fmt(o.salePrice)}</p>${badge(o.status,STATUS_MAP)}</div>
    </div>`).join('');

  main.innerHTML=`
    <div class="flex items-center justify-between px-6 py-5 border-b border-[#1e2535]">
      <div><h1 class="text-lg font-bold text-white">Dashboard</h1><p class="text-xs text-gray-500 mt-0.5">${new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</p></div>
    </div>
    ${alertsHTML}
    <!-- META SEMANAL -->
    <div class="mx-6 mt-4 bg-[#151926] border border-[#1e2535] rounded-xl p-4">
      <div class="flex items-center justify-between mb-2">
        <p class="text-xs font-bold text-gray-500 uppercase tracking-widest">🎯 Meta Semanal</p>
        <p class="text-sm font-bold ${netProfit>=0?'text-violet-400':'text-gray-500'}">${fmt(weekRevenue)} <span class="text-gray-600">/ ${fmt(meta)}</span></p>
      </div>
      <div class="progress-bar"><div class="progress-fill bg-violet-600" style="width:${metaPct}%"></div></div>
      <p class="text-xs text-gray-600 mt-1">${metaPct}% da meta atingida esta semana</p>
    </div>
    <!-- B2B vs Individual split -->
    ${revenue>0?`<div class="mx-6 mt-3 bg-[#151926] border border-[#1e2535] rounded-xl p-4">
      <p class="text-xs font-bold text-gray-500 uppercase tracking-widest mb-3">📊 Origem do faturamento do mês</p>
      <div class="grid grid-cols-2 gap-3">
        <div class="bg-[#0f1319] rounded-xl p-3 text-center">
          <div class="text-xs text-[#38bdf8] font-semibold uppercase tracking-wider mb-1">B2B / Evento</div>
          <div class="text-lg font-bold text-white">${fmt(b2bRev)}</div>
          <div class="text-xs text-gray-600">${revenue>0?r2((b2bRev/revenue)*100):0}% do total</div>
        </div>
        <div class="bg-[#0f1319] rounded-xl p-3 text-center">
          <div class="text-xs text-[#a78bfa] font-semibold uppercase tracking-wider mb-1">Individual</div>
          <div class="text-lg font-bold text-white">${fmt(indRev)}</div>
          <div class="text-xs text-gray-600">${revenue>0?r2((indRev/revenue)*100):0}% do total</div>
        </div>
      </div>
    </div>`:''}

    <!-- STAT CARDS -->
    <div class="grid grid-cols-3 gap-4 p-6 pb-3">
      ${sCard('Faturamento Mês',fmt(revenue),'Pedidos entregues','linear-gradient(135deg,#7c3aed,#4f46e5)','dollar-sign')}
      ${sCard('Gastos Mês',fmt(expenses),`${thisMonthExp.length} lançamento(s)`,'linear-gradient(135deg,#dc2626,#ef4444)','credit-card')}

let editingExpense=null, gastoFilter='all', gastoMonth='';

  const filtered=state.expenses.filter(e=>{
    const d=new Date((e.date||today())+'T12:00:00');

  const total=filtered.reduce((s,e)=>s+(e.amount||0),0);

  const rows=filtered.length===0

  const catFilters=['all',...EXPENSE_CATS].map(c=>`<button onclick="gastoFilter='${c}';setTab('gastos')" class="px-3 py-1.5 rounded-lg text-xs font-semibold transition whitespace-nowrap ${gastoFilter===c?'bg-violet-600 text-white':'bg-[#1e2535] text-gray-500 hover:text-gray-300'}">${c==='all'?'Todos':((EXPENSE_ICONS[c]||'')+ ' '+c)}</button>`).join('');

  const bycatHTML=bycat.length===0?'<p class="text-xs text-gray-600">Sem dados</p>':bycat.map(x=>`
    <div class="mb-2">
      <div class="flex justify-between text-xs mb-1"><span class="text-gray-400">${EXPENSE_ICONS[x.cat]||''} ${x.cat}</span><span class="text-white font-mono">${fmt(x.v)}</span></div>
      <div class="progress-bar"><div class="progress-fill" style="width:${x.pct}%;background:#7c3aed"></div></div>
    </div>`).join('');

  main.innerHTML=`
    <div class="flex items-center justify-between px-6 py-5 border-b border-[#1e2535]">
      <div><h1 class="text-lg font-bold text-white">Gastos</h1><p class="text-xs text-gray-500 mt-0.5">Controle de despesas do negócio</p></div>
      <div class="flex items-center gap-3">
        <input type="month" class="ic" style="width:170px" value="${gastoMonth}" onchange="gastoMonth=this.value;setTab('gastos')">
        <button onclick="openExpenseModal(null)" class="flex items-center gap-2 px-4 py-2 rounded-xl text-sm font-semibold bg-violet-600 hover:bg-violet-500 text-white transition"><i data-lucide="plus" class="w-3.5 h-3.5"></i> Novo Gasto</button>
      </div>
    </div>
    <div class="grid grid-cols-3 gap-4 p-6 pb-3">
      ${sCard('Total do Período',fmt(total),`${filtered.length} lançamento(s)`,'linear-gradient(135deg,#dc2626,#ef4444)','credit-card')}
      ${sCard('Maior Categoria',bycat[0]?bycat[0].cat:'—',bycat[0]?fmt(bycat[0].v):'Sem dados','linear-gradient(135deg,#d97706,#f59e0b)','tag')}
      ${sCard('Média por Lançamento',filtered.length?fmt(total/filtered.length):'—','Custo médio','linear-gradient(135deg,#7c3aed,#a78bfa)','bar-chart-2')}
    </div>
    <div class="grid gap-4 px-6 pb-3" style="grid-template-columns:1fr 280px">
      <div>
        <div class="flex gap-2 mb-3 flex-wrap">${catFilters}</div>
        <div class="bg-[#151926] border border-[#1e2535] rounded-2xl overflow-hidden">
          <table class="w-full text-sm">

              ${['Descrição','Categoria','Pagamento','Valor',''].map(h=>`<th class="py-3 px-4 font-semibold">${h}</th>`).join('')}

    </div>`;

}
function saveMat(){if(!editingMat.name.trim())return alert('Informe o nome!');const m={...editingMat,id:editingMat.id||genId(),pricePerGram:+editingMat.pricePerGram||80};const i=state.materials.findIndex(x=>x.id===m.id);if(i>=0)state.materials[i]=m;else state.materials=[...state.materials,m];saveAll();closeModal();setTab('materials');}
function deleteMat(id){if(confirm('Excluir material?')){state.materials=state.materials.filter(m=>m.id!==id);saveAll();setTab('materials');}}

// ── FINANCEIRO ────────────────────────────────────────────────────────────────
let finP1='', finP2='';
function initFinPeriods(){const now=new Date();finP2=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;finP1=now.getMonth()===0?`${now.getFullYear()-1}-12`:`${now.getFullYear()}-${String(now.getMonth()).padStart(2,'0')}`;}
function renderFinanceiro(main){
  const now=new Date();
  const monthly=Array.from({length:12},(_,i)=>{
    const d=new Date(now.getFullYear(),now.getMonth()-(11-i),1);
    const mo=getMonthOrders(d).filter(o=>o.status==='entregue');
    const ex=getMonthExpenses(d);
    const fat=r2(mo.reduce((s,o)=>s+(o.salePrice||0),0));
    const gas=r2(ex.reduce((s,e)=>s+(e.amount||0),0));
    return{name:MONTHS[d.getMonth()],fat,gas,liq:r2(fat-gas)};
  });

  const allDel=state.orders.filter(o=>o.status==='entregue');
  const totRev=allDel.reduce((s,o)=>s+(o.salePrice||0),0);
  const totGas=state.expenses.reduce((s,e)=>s+(e.amount||0),0);
  const totLucLiq=r2(totRev-totGas);

  const getPeriod=pStr=>{
    const[y,m]=pStr.split('-').map(Number);
    const d=new Date(y,m-1,1);
    const mo=getMonthOrders(d).filter(o=>o.status==='entregue');
    const ex=getMonthExpenses(d);
    const rev=mo.reduce((s,o)=>s+(o.salePrice||0),0);
    const gas=ex.reduce((s,e)=>s+(e.amount||0),0);
    const lucLiq=r2(rev-gas);
    return{total:getMonthOrders(d).length,delivered:mo.length,rev,gas,lucLiq,margin:rev?r2((lucLiq/rev)*100):0};
  };
  const fmtP=p=>{const[y,m]=p.split('-').map(Number);return`${MONTHS[m-1]}/${y}`;};
  const pd1=getPeriod(finP1),pd2=getPeriod(finP2);

  const periodCard=(p,d)=>`<div class="bg-[#0f1219] border border-[#2a3045] rounded-xl p-4">
    <p class="font-bold text-white mb-3">${fmtP(p)}</p>
    <div class="space-y-2 text-sm">
      <div class="flex justify-between"><span class="text-gray-500">Pedidos</span><span class="text-white">${d.total} (${d.delivered} entregues)</span></div>
      <div class="flex justify-between"><span class="text-gray-500">Faturamento</span><span class="text-violet-400 font-bold font-mono">${fmt(d.rev)}</span></div>
      <div class="flex justify-between"><span class="text-gray-500">Gastos registrados</span><span class="text-red-400 font-mono">- ${fmt(d.gas)}</span></div>
      <div class="flex justify-between pt-2 border-t border-[#2a3045]"><span class="text-white font-bold">Lucro Líquido</span><span class="font-bold font-mono ${d.lucLiq>=0?'text-emerald-400':'text-red-400'}">${fmt(d.lucLiq)}</span></div>
      <div class="flex justify-between"><span class="text-gray-500">Margem líquida</span><span class="text-white">${d.margin}%</span></div>
    </div>
  </div>`;

  main.innerHTML=`
    <div class="flex items-center justify-between px-6 py-5 border-b border-[#1e2535]">
      <div><h1 class="text-lg font-bold text-white">Financeiro — DRE</h1><p class="text-xs text-gray-500">Demonstrativo de resultado completo</p></div>
    </div>
    <!-- TOTAIS HISTORICOS -->
    <div class="grid grid-cols-3 gap-4 p-6 pb-3">
      ${sCard('Faturamento Total',fmt(totRev),`${allDel.length} pedidos entregues`,'linear-gradient(135deg,#7c3aed,#4f46e5)','dollar-sign')}
      ${sCard('Gastos Totais',fmt(totGas),'Despesas operacionais registradas','linear-gradient(135deg,#dc2626,#ef4444)','credit-card')}
      ${sCard('Lucro Líquido',fmt(totLucLiq),'Faturamento − Gastos',totLucLiq>=0?'linear-gradient(135deg,#059669,#10b981)':'linear-gradient(135deg,#991b1b,#dc2626)','trending-up')}
    </div>
    <!-- GRAFICO 12 MESES -->
    <div class="px-6 pb-4">
      <div class="bg-[#151926] border border-[#1e2535] rounded-2xl p-5">
        <p class="text-xs font-bold text-gray-600 uppercase tracking-widest mb-4">Últimos 12 meses — Faturamento, Gastos e Lucro Líquido</p>
        <div style="height:240px"><canvas id="chart-fin"></canvas></div>
      </div>
    </div>
    <!-- COMPARATIVO -->
    <div class="px-6 pb-6">
      <div class="bg-[#151926] border border-[#1e2535] rounded-2xl p-5">
        <p class="text-xs font-bold text-gray-600 uppercase tracking-widest mb-4">Comparativo entre Períodos</p>
        <div class="flex gap-4 mb-5">
          <div><label class="text-xs text-gray-600 block mb-1 uppercase tracking-wider">Período 1</label>
            <input type="month" class="ic" style="width:180px" value="${finP1}" onchange="finP1=this.value;setTab('financeiro')"></div>
          <div><label class="text-xs text-gray-600 block mb-1 uppercase tracking-wider">Período 2</label>
            <input type="month" class="ic" style="width:180px" value="${finP2}" onchange="finP2=this.value;setTab('financeiro')"></div>
        </div>
        <div class="grid grid-cols-2 gap-4 mb-5">${periodCard(finP1,pd1)}${periodCard(finP2,pd2)}</div>
        <div style="height:200px"><canvas id="chart-cmp"></canvas></div>
      </div>
    </div>`;

  setTimeout(()=>{
    makeLineChart('chart-fin',monthly.map(d=>d.name),[
      {label:'Faturamento',data:monthly.map(d=>d.fat),borderColor:'#7c3aed',backgroundColor:'rgba(124,58,237,.1)',fill:true,tension:0.4,borderWidth:2},
      {label:'Gastos',data:monthly.map(d=>d.gas),borderColor:'#ef4444',backgroundColor:'rgba(239,68,68,.1)',fill:true,tension:0.4,borderWidth:2},
      {label:'Lucro Líquido',data:monthly.map(d=>d.liq),borderColor:'#10b981',backgroundColor:'rgba(16,185,129,.1)',fill:true,tension:0.4,borderWidth:2},
    ]);
    const cmpLabels=['Faturamento','Gastos','Lucro Líquido'];
    makeBarChart('chart-cmp',cmpLabels,[
      {label:fmtP(finP1),data:[pd1.rev,pd1.gas,pd1.lucLiq],backgroundColor:'#7c3aed',borderRadius:4},
      {label:fmtP(finP2),data:[pd2.rev,pd2.gas,pd2.lucLiq],backgroundColor:'#10b981',borderRadius:4},
    ]);
  },50);
}

// ── SETTINGS ──────────────────────────────────────────────────────────────────
let editingSettings=null;
function renderSettings(main){
  const f=editingSettings||{...state.settings};
  editingSettings=f;
  main.innerHTML=`
    <div class="flex items-center justify-between px-6 py-5 border-b border-[#1e2535]">
      <div><h1 class="text-lg font-bold text-white">Configurações</h1></div>
    </div>
    <div class="p-6 max-w-lg space-y-4">
      <div class="bg-[#151926] border border-[#1e2535] rounded-2xl p-5 space-y-4">
        <p class="text-xs font-bold text-gray-600 uppercase tracking-widest">⚙️ Custos Padrão</p>
        <div><label class="block text-xs font-semibold text-gray-500 mb-1.5 uppercase tracking-wider">Preço padrão do filamento (R$/kg)</label>
          <input type="number" class="ic" step="1" min="0" value="${f.filamentPerGram}" oninput="editingSettings.filamentPerGram=+this.value"></div>
        <div><label class="block text-xs font-semibold text-gray-500 mb-1.5 uppercase tracking-wider">Custo de energia (R$/hora)</label>
          <input type="number" class="ic" step="0.01" min="0" value="${f.electricityPerHour}" oninput="editingSettings.electricityPerHour=+this.value"></div>
        <div><label class="block text-xs font-semibold text-gray-500 mb-1.5 uppercase tracking-wider">Valor da hora de trabalho (R$/h)</label>
          <input type="number" class="ic" step="1" min="0" value="${f.laborPerHour}" oninput="editingSettings.laborPerHour=+this.value"></div>
        <div><label class="block text-xs font-semibold text-gray-500 mb-1.5 uppercase tracking-wider">Margem de lucro padrão (%)</label>
          <input type="number" class="ic" step="1" min="0" max="500" value="${f.defaultMargin}" oninput="editingSettings.defaultMargin=+this.value"></div>
        <div><label class="block text-xs font-semibold text-gray-500 mb-1.5 uppercase tracking-wider">🎯 Meta Semanal (R$)</label>
          <input type="number" class="ic" step="50" min="0" value="${f.metaSemanal||1000}" oninput="editingSettings.metaSemanal=+this.value"></div>
      </div>
      <div class="bg-[#151926] border border-[#1e2535] rounded-2xl p-5">
        <p class="text-xs font-bold text-gray-600 uppercase tracking-widest mb-3">💡 Fórmula de cálculo</p>
        <div class="space-y-1.5 text-xs text-gray-500">
          <p>🧵 Filamento: Peso × R$${(f.filamentPerGram/1000).toFixed(3)}/g (= R$${f.filamentPerGram}/kg)</p>
          <p>⚡ Energia: Tempo impressão × R$${f.electricityPerHour}/h</p>
          <p>👷 Mão de obra: Horas acabamento × R$${f.laborPerHour}/h</p>
          <p>🔄 Falhas: 10% do custo de produção (automático)</p>
          <p class="pt-2 border-t border-[#1e2535]">💰 Preço sugerido = Custo total × (1 + ${f.defaultMargin}%)</p>
        </div>
      </div>
      <div class="bg-[#151926] border border-[#1e2535] rounded-2xl p-5">
        <p class="text-xs font-bold text-gray-600 uppercase tracking-widest mb-3">💾 Backup de dados</p>
        <p class="text-xs text-gray-500 mb-3">Dados salvos automaticamente no seu navegador.</p>
        <button onclick="exportData()" class="w-full bg-[#1e2535] hover:bg-[#262e42] text-gray-300 rounded-xl py-2.5 text-sm font-semibold transition mb-2">📤 Exportar JSON</button>
        <label class="block w-full bg-[#1e2535] hover:bg-[#262e42] text-gray-300 rounded-xl py-2.5 text-sm font-semibold transition text-center cursor-pointer">📥 Importar JSON<input type="file" accept=".json" class="hidden" onchange="importData(event)"></label>
      </div>
      <button onclick="saveSettings()" class="w-full bg-violet-600 hover:bg-violet-500 text-white rounded-xl py-3 font-bold text-sm transition">Salvar Configurações</button>
    </div>`;
}
function saveSettings(){state.settings={...editingSettings};editingSettings=null;saveAll();alert('✅ Configurações salvas!');}
function exportData(){
  const data=JSON.stringify({orders:state.orders,clients:state.clients,materials:state.materials,settings:state.settings,expenses:state.expenses,consignment:state.consignment},null,2);
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([data],{type:'application/json'}));a.download=`print-manager-backup-${today()}.json`;a.click();
}
function importData(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(d.orders)state.orders=d.orders;if(d.clients)state.clients=d.clients;if(d.materials)state.materials=d.materials;if(d.settings)state.settings=d.settings;if(d.expenses)state.expenses=d.expenses;if(d.consignment)state.consignment=d.consignment;saveAll();alert('✅ Importado!');setTab('dashboard');}catch{alert('Arquivo inválido!');}};r.readAsText(f);
}

// ── MODAL ─────────────────────────────────────────────────────────────────────
function closeModal(){document.getElementById('modal').classList.add('hidden');editingOrder=null;editingClient=null;editingMat=null;editingConsign=null;editingExpense=null;}
document.getElementById('modal').addEventListener('click',function(e){if(e.target===this){if(editingOrder||editingClient||editingMat||editingConsign||editingExpense){if(confirm('Sair sem salvar?'))closeModal();}else closeModal();}});

// ── INIT ──────────────────────────────────────────────────────────────────────
document.querySelectorAll('.nav-btn').forEach(b=>b.addEventListener('click',()=>setTab(b.dataset.tab)));
initFinPeriods();
state.orders     = stLoad(SK.o, []);
state.clients    = stLoad(SK.c, []);
state.materials  = stLoad(SK.m, DEF_MATERIALS);
state.settings   = stLoad(SK.s, DEF_SETTINGS);
state.expenses   = stLoad(SK.e, []);
state.consignment = stLoad(SK.cs, []);
document.getElementById('loading').style.display = 'none';
document.getElementById('app').style.display = 'flex';
document.getElementById('app').style.display='flex';
setTab('dashboard');
</script>
</body>
