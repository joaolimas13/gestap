<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Print Manager — Impressão 3D</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { font-family: 'DM Sans', 'Segoe UI', system-ui, sans-serif; }
  body { background: #0c101a; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: #0f1319; }
  ::-webkit-scrollbar-thumb { background: #2a3045; border-radius: 3px; }
  .ic { width:100%; background:#1a1f2e; border:1px solid #2a3045; border-radius:8px; padding:8px 12px; color:white; font-size:14px; outline:none; transition:border-color 0.15s; }
  .ic:focus { border-color:#7c3aed; box-shadow:0 0 0 2px rgba(124,58,237,0.2); }
  .ic::placeholder { color: #4b5563; }
  select.ic option { background:#1a1f2e; }
  .modal-overlay { position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);z-index:50;display:flex;align-items:center;justify-content:center;padding:16px; }
  .modal-box { background:#151926;border:1px solid #2a3045;border-radius:16px;width:100%;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 25px 50px rgba(0,0,0,0.5); }
  .hidden { display: none !important; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
  .pulse { animation: pulse 1.5s ease-in-out infinite; }
  .group:hover .group-hover-show { opacity:1 !important; }
  tr:hover .row-actions { opacity:1 !important; }
  .row-actions { opacity:0; transition:opacity 0.15s; }
  .stat-card { position:relative;overflow:hidden;border-radius:16px;border:1px solid rgba(255,255,255,0.05);padding:20px; background:linear-gradient(135deg,#151926 0%,#1a1f2e 100%); }
  .stat-card .bg-gradient { position:absolute;inset:0;opacity:0.2; }
  .badge { display:inline-flex;align-items:center;gap:6px;padding:2px 10px;border-radius:9999px;font-size:12px;font-weight:600; }
  .btn-primary { background:#7c3aed;color:white; }
  .btn-primary:hover { background:#6d28d9; }
  .btn-secondary { background:#1e2535;color:#d1d5db; }
  .btn-secondary:hover { background:#262e42; }
</style>
</head>
<body class="text-gray-100 overflow-hidden h-screen">

<!-- LOADING -->
<div id="loading" class="flex items-center justify-center h-screen">
  <div class="text-center">
    <div class="text-5xl mb-4 pulse">🖨️</div>
    <p class="text-gray-600 text-sm">Carregando seus dados...</p>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden flex h-screen overflow-hidden">

  <!-- SIDEBAR -->
  <aside class="w-52 bg-[#0f1319] border-r border-[#1a1f2e] flex flex-col flex-shrink-0">
    <div class="px-4 py-5 border-b border-[#1a1f2e]">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 rounded-xl bg-violet-600/20 border border-violet-500/30 flex items-center justify-center text-lg">🖨️</div>
        <div>
          <p class="font-bold text-white text-sm tracking-tight">Print Manager</p>
          <p class="text-xs text-gray-600">Impressão 3D</p>
        </div>
      </div>
    </div>
    <nav class="flex-1 p-3 space-y-0.5" id="nav">
      <button data-tab="dashboard"  class="nav-btn w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-all"><i data-lucide="home" class="w-4 h-4"></i><span class="flex-1 text-left">Dashboard</span></button>
      <button data-tab="orders"     class="nav-btn w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-all"><i data-lucide="package" class="w-4 h-4"></i><span class="flex-1 text-left">Pedidos</span><span id="orders-badge" class="hidden bg-red-500 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center font-bold"></span></button>
      <button data-tab="clients"    class="nav-btn w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-all"><i data-lucide="users" class="w-4 h-4"></i><span class="flex-1 text-left">Clientes</span></button>
      <button data-tab="materials"  class="nav-btn w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-all"><i data-lucide="box" class="w-4 h-4"></i><span class="flex-1 text-left">Materiais</span></button>
      <button data-tab="financeiro" class="nav-btn w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-all"><i data-lucide="bar-chart-2" class="w-4 h-4"></i><span class="flex-1 text-left">Financeiro</span></button>
      <button data-tab="settings"   class="nav-btn w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-all"><i data-lucide="settings" class="w-4 h-4"></i><span class="flex-1 text-left">Configurações</span></button>
    </nav>
    <div class="p-4 border-t border-[#1a1f2e]">
      <p class="text-xs text-gray-700" id="sidebar-active-count">0 pedidos ativos</p>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="flex-1 overflow-auto bg-[#0c101a]" id="main-content"></main>
</div>

<!-- MODAL -->
<div id="modal" class="modal-overlay hidden">
  <div class="modal-box" id="modal-box" style="max-width:600px">
    <div class="flex items-center justify-between px-6 py-4 border-b border-[#2a3045] flex-shrink-0">
      <h2 class="font-bold text-white text-sm tracking-wide uppercase" id="modal-title"></h2>
      <button onclick="closeModal()" class="text-gray-500 hover:text-white p-1.5 rounded-lg hover:bg-white/5 transition"><i data-lucide="x" class="w-4 h-4"></i></button>
    </div>
    <div class="overflow-y-auto p-6 flex-1" id="modal-body"></div>
  </div>
</div>

<script>
// ── STATE ──────────────────────────────────────────────────────────────────────
const SK = { o:'imp3d_orders', c:'imp3d_clients', m:'imp3d_materials', s:'imp3d_settings' };
const DEF_SETTINGS = { filamentPerGram:80, electricityPerHour:0.50, laborPerHour:25, defaultMargin:30 };
const DEF_MATERIALS = [
  { id:'m1', name:'PLA',    type:'PLA',    pricePerGram:120 },
  { id:'m2', name:'PETG',   type:'PETG',   pricePerGram:100 },
  { id:'m3', name:'ABS',    type:'ABS',    pricePerGram:90 },
  { id:'m4', name:'Resina', type:'Resina', pricePerGram:150 },
  { id:'m5', name:'TPU',    type:'TPU',    pricePerGram:120 },
];
const STATUS_MAP = {
  aguardando:{ label:'Aguardando',   bg:'rgba(245,158,11,0.15)',  color:'#f59e0b', dot:'#f59e0b' },
  imprimindo: { label:'Em Impressão', bg:'rgba(56,189,248,0.15)', color:'#38bdf8', dot:'#38bdf8' },
  entregue:   { label:'Entregue',     bg:'rgba(52,211,153,0.15)', color:'#34d399', dot:'#34d399' },
};
const PAY_METHODS = { pix:'Pix', cartao:'Cartão', entrada50:'50% + 50%', parcelado:'Parcelado' };
const PAY_STATUS_MAP = {
  pendente:{ label:'Pendente',      color:'#f87171' },
  parcial: { label:'Entrada Paga',  color:'#fbbf24' },
  pago:    { label:'Pago',          color:'#34d399' },
};
const MONTHS = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
const MAT_TYPES = ['PLA','PETG','ABS','Resina','TPU','ASA','Nylon','HIPS','Outro'];

let state = { orders:[], clients:[], materials:DEF_MATERIALS, settings:DEF_SETTINGS };
let currentTab = 'dashboard';
let charts = {};

// ── STORAGE ────────────────────────────────────────────────────────────────────
function stLoad(key, def) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : def; }
  catch { return def; }
}
function stSave(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
}
function saveAll() {
  stSave(SK.o, state.orders);
  stSave(SK.c, state.clients);
  stSave(SK.m, state.materials);
  stSave(SK.s, state.settings);
}

// ── HELPERS ────────────────────────────────────────────────────────────────────
const fmt   = v => new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(v||0);
const fmtD  = d => d ? new Date(d+'T12:00:00').toLocaleDateString('pt-BR') : '—';
const r2    = v => Math.round((v||0)*100)/100;
const genId = () => Math.random().toString(36).substr(2,9);
const today = () => new Date().toISOString().split('T')[0];
const esc   = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function calcCosts(o, cfg, mats) {
  const mat = mats.find(m=>m.id===o.materialId) || { pricePerGram:cfg.filamentPerGram }; // stored as R$/kg, divided by 1000 in calc
  const filamentCost    = r2((+o.weightGrams||0)*(mat.pricePerGram/1000));
  const electricityCost = r2((+o.printHours||0)*cfg.electricityPerHour);
  const laborCost       = r2((+o.laborHours||0)*cfg.laborPerHour);
  const failureCost     = r2(+o.failureCost||0);
  const totalCost       = r2(filamentCost+electricityCost+laborCost+failureCost);
  const profit          = r2((+o.salePrice||0)-totalCost);
  const margin          = o.salePrice ? r2((profit/(+o.salePrice))*100) : 0;
  return { filamentCost,electricityCost,laborCost,failureCost,totalCost,profit,margin };
}
function suggestPrice(o, cfg, mats) {
  const mat = mats.find(m=>m.id===o.materialId)||{pricePerGram:cfg.filamentPerGram};
  const cost=(+o.weightGrams||0)*(mat.pricePerGram/1000)+(+o.printHours||0)*cfg.electricityPerHour+(+o.laborHours||0)*cfg.laborPerHour+(+o.failureCost||0);
  return r2(cost*(1+cfg.defaultMargin/100));
}
function badge(type, map) {
  const c = map[type]||{label:type,bg:'rgba(107,114,128,0.3)',color:'#9ca3af',dot:'#9ca3af'};
  return `<span class="badge" style="background:${c.bg};color:${c.color}"><span style="width:6px;height:6px;border-radius:50%;background:${c.dot};display:inline-block"></span>${esc(c.label)}</span>`;
}
function getAlerts() {
  const now = new Date();
  return state.orders.filter(o=>{
    if(o.status==='entregue'||!o.deadline) return false;
    return (new Date(o.deadline+'T12:00:00')-now)/86400000<=2;
  });
}

// ── CHART HELPERS ─────────────────────────────────────────────────────────────
function destroyChart(id) { if(charts[id]){charts[id].destroy();delete charts[id];} }
function makeBarChart(canvasId, data, datasets) {
  destroyChart(canvasId);
  const ctx = document.getElementById(canvasId);
  if(!ctx) return;
  charts[canvasId] = new Chart(ctx, {
    type:'bar',
    data:{ labels:data.map(d=>d.name), datasets },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{ labels:{ color:'#6b7280',font:{size:11},usePointStyle:true,pointStyle:'circle' } } },
      scales:{
        x:{ ticks:{color:'#4b5563',font:{size:11}}, grid:{color:'#1e2535'}, border:{display:false} },
        y:{ ticks:{color:'#4b5563',font:{size:10},callback:v=>v>=1000?`${(v/1e3).toFixed(1)}k`:v}, grid:{color:'#1e2535'}, border:{display:false} }
      }
    }
  });
}
function makeAreaChart(canvasId, data, datasets) {
  destroyChart(canvasId);
  const ctx = document.getElementById(canvasId);
  if(!ctx) return;
  charts[canvasId] = new Chart(ctx, {
    type:'line',
    data:{ labels:data.map(d=>d.name), datasets },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{ labels:{ color:'#6b7280',font:{size:11},usePointStyle:true,pointStyle:'circle' } } },
      scales:{
        x:{ ticks:{color:'#4b5563',font:{size:11}}, grid:{color:'#1e2535'}, border:{display:false} },
        y:{ ticks:{color:'#4b5563',font:{size:10},callback:v=>v>=1000?`${(v/1e3).toFixed(1)}k`:v}, grid:{color:'#1e2535'}, border:{display:false} }
      }
    }
  });
}

// ── NAVIGATION ────────────────────────────────────────────────────────────────
function setTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.nav-btn').forEach(b=>{
    const active = b.dataset.tab===tab;
    b.className = `nav-btn w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-all ${active?'bg-violet-600/90 text-white shadow-lg shadow-violet-900/30':'text-gray-500 hover:bg-[#1a1f2e] hover:text-gray-300'}`;
  });
  // update badge
  const alerts = getAlerts();
  const badge_el = document.getElementById('orders-badge');
  if(alerts.length>0){ badge_el.classList.remove('hidden'); badge_el.textContent=alerts.length; }
  else badge_el.classList.add('hidden');
  // sidebar count
  document.getElementById('sidebar-active-count').textContent = `${state.orders.filter(o=>o.status!=='entregue').length} pedidos ativos`;
  renderTab();
}
function renderTab() {
  const main = document.getElementById('main-content');
  // destroy old charts
  Object.keys(charts).forEach(destroyChart);
  if(currentTab==='dashboard') renderDashboard(main);
  else if(currentTab==='orders') renderOrders(main);
  else if(currentTab==='clients') renderClients(main);
  else if(currentTab==='materials') renderMaterials(main);
  else if(currentTab==='financeiro') renderFinanceiro(main);
  else if(currentTab==='settings') renderSettings(main);
  lucide.createIcons();
}

// ── DASHBOARD ─────────────────────────────────────────────────────────────────
function renderDashboard(main) {
  const now = new Date();
  const thisMonthOrders = state.orders.filter(o=>{
    const d=new Date((o.createdAt||today())+'T12:00:00');
    return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();
  });
  const delivered = thisMonthOrders.filter(o=>o.status==='entregue');
  const revenue   = delivered.reduce((s,o)=>s+(o.salePrice||0),0);
  const profit    = delivered.reduce((s,o)=>s+(o.profit||0),0);
  const active    = state.orders.filter(o=>o.status!=='entregue').length;
  const toReceive = state.orders.filter(o=>o.paymentStatus!=='pago'&&o.status==='entregue').reduce((s,o)=>s+(o.salePrice||0),0);
  const alerts    = getAlerts();
  const recent    = [...state.orders].sort((a,b)=>new Date(b.createdAt||0)-new Date(a.createdAt||0)).slice(0,5);

  const chartData = Array.from({length:6},(_,i)=>{
    const d=new Date(now.getFullYear(),now.getMonth()-(5-i),1);
    const mo=state.orders.filter(o=>{
      const od=new Date((o.createdAt||today())+'T12:00:00');
      return od.getMonth()===d.getMonth()&&od.getFullYear()===d.getFullYear()&&o.status==='entregue';
    });
    return { name:MONTHS[d.getMonth()], fat:r2(mo.reduce((s,o)=>s+(o.salePrice||0),0)), cus:r2(mo.reduce((s,o)=>s+(o.totalCost||0),0)), luc:r2(mo.reduce((s,o)=>s+(o.profit||0),0)) };
  });

  const alertsHTML = alerts.length>0 ? `
    <div class="mx-6 mt-4 bg-red-400/5 border border-red-400/20 rounded-xl p-4">
      <p class="text-xs font-bold text-red-400 uppercase tracking-widest flex items-center gap-2 mb-2">
        <i data-lucide="bell" class="w-3 h-3"></i> ${alerts.length} pedido(s) com prazo próximo
      </p>
      ${alerts.map(a=>`
        <div class="flex items-center text-sm text-gray-400 gap-2 mt-1.5">
          <i data-lucide="chevron-right" class="w-3 h-3 text-red-400 flex-shrink-0"></i>
          <span class="font-semibold text-white">${esc(a.description)}</span>
          ${a.clientName?`<span class="text-gray-600">· ${esc(a.clientName)}</span>`:''}
          <span class="ml-auto text-red-300 text-xs font-mono">prazo: ${fmtD(a.deadline)}</span>
        </div>`).join('')}
    </div>` : '';

  const recentHTML = recent.length===0
    ? '<p class="text-sm text-gray-600">Nenhum pedido ainda</p>'
    : recent.map(o=>`
      <div class="flex items-start gap-3 py-1.5 border-b border-[#1e2535] last:border-0">
        <div class="flex-1 min-w-0">
          <p class="text-sm font-medium text-white truncate">${esc(o.description)}</p>
          <p class="text-xs text-gray-600 truncate">${esc(o.clientName||'Sem cliente')}</p>
        </div>
        <div class="text-right flex-shrink-0">
          <p class="text-sm font-bold text-white">${fmt(o.salePrice)}</p>
          ${badge(o.status,STATUS_MAP)}
        </div>
      </div>`).join('');

  main.innerHTML = `
    <div class="flex items-center justify-between px-6 py-5 border-b border-[#1e2535]">
      <div>
        <h1 class="text-lg font-bold text-white tracking-tight">Dashboard</h1>
        <p class="text-xs text-gray-500 mt-0.5">${new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</p>
      </div>
    </div>
    ${alertsHTML}
    <div class="grid grid-cols-4 gap-4 p-6">
      ${statCard('Faturamento do Mês',fmt(revenue),'Pedidos entregues','linear-gradient(135deg,#7c3aed,#4f46e5)','dollar-sign')}
      ${statCard('Lucro do Mês',fmt(profit),revenue>0?`Margem ${r2((profit/revenue)*100)}%`:'—','linear-gradient(135deg,#059669,#10b981)','trending-up')}
      ${statCard('Pedidos Ativos',active,'Em andamento','linear-gradient(135deg,#0284c7,#38bdf8)','package')}
      ${statCard('A Receber',fmt(toReceive),'Pagamentos pendentes','linear-gradient(135deg,#d97706,#f59e0b)','dollar-sign')}
    </div>
    <div class="grid gap-4 px-6 pb-6" style="grid-template-columns:2fr 1fr">
      <div class="bg-[#151926] border border-[#1e2535] rounded-2xl p-5">
        <p class="text-xs font-bold text-gray-500 uppercase tracking-widest mb-4">Últimos 6 meses — pedidos entregues</p>
        <div style="height:210px"><canvas id="chart-dashboard"></canvas></div>
      </div>
      <div class="bg-[#151926] border border-[#1e2535] rounded-2xl p-5">
        <div class="flex items-center justify-between mb-4">
          <p class="text-xs font-bold text-gray-500 uppercase tracking-widest">Recentes</p>
          <button onclick="setTab('orders')" class="text-xs text-violet-400 hover:text-violet-300 transition">Ver todos →</button>
        </div>
        <div class="space-y-3">${recentHTML}</div>
      </div>
    </div>`;

  lucide.createIcons();
  setTimeout(()=>{
    makeBarChart('chart-dashboard', chartData, [
      { label:'Faturamento', data:chartData.map(d=>d.fat), backgroundColor:'#7c3aed', borderRadius:4 },
      { label:'Custos',      data:chartData.map(d=>d.cus), backgroundColor:'#ef4444', borderRadius:4 },
      { label:'Lucro',       data:chartData.map(d=>d.luc), backgroundColor:'#10b981', borderRadius:4 },
    ]);
  }, 50);
}

function statCard(title,value,sub,gradient,icon) {
  return `<div class="stat-card">
    <div class="bg-gradient" style="background:${gradient}"></div>
    <div style="position:relative">
      <div style="width:36px;height:36px;border-radius:12px;background:${gradient};display:flex;align-items:center;justify-content:center;margin-bottom:16px">
        <i data-lucide="${icon}" style="width:16px;height:16px;color:white"></i>
      </div>
      <div class="text-2xl font-bold text-white tracking-tight">${value}</div>
      <div class="text-xs font-medium text-gray-400 mt-1">${title}</div>
      ${sub?`<div class="text-xs text-gray-600 mt-0.5">${sub}</div>`:''}
    </div>
  </div>`;
}

// ── ORDERS ────────────────────────────────────────────────────────────────────
let orderFilter = 'all', orderSearch = '';
function renderOrders(main) {
  const filtered = state.orders.filter(o=>{
    if(orderFilter!=='all'&&o.status!==orderFilter) return false;
    const s=orderSearch.toLowerCase();
    if(s&&!o.description?.toLowerCase().includes(s)&&!o.clientName?.toLowerCase().includes(s)) return false;
    return true;
  }).sort((a,b)=>new Date(b.createdAt||0)-new Date(a.createdAt||0));

  const rows = filtered.length===0
    ? `<tr><td colspan="8" class="text-center py-16 text-gray-600"><div class="flex flex-col items-center gap-3"><i data-lucide="package" style="width:36px;height:36px;opacity:0.3"></i><p>Nenhum pedido encontrado</p></div></td></tr>`
    : filtered.map(o=>{
        const overdue = o.deadline&&o.status!=='entregue'&&new Date(o.deadline+'T12:00:00')<new Date();
        return `<tr class="hover:bg-[#1a1f2e] transition cursor-pointer" onmouseenter="this.querySelector('.row-actions').style.opacity='1'" onmouseleave="this.querySelector('.row-actions').style.opacity='0'">
          <td class="py-3 pr-4"><p class="font-semibold text-white">${esc(o.description)}</p><p class="text-xs text-gray-600">${esc(o.materialName||'')} · ${o.weightGrams}g · ${o.printHours}h</p></td>
          <td class="py-3 pr-4 text-gray-400 text-sm">${esc(o.clientName||'—')}</td>
          <td class="py-3 pr-4">${badge(o.status,STATUS_MAP)}</td>
          <td class="py-3 pr-4 text-xs font-mono ${overdue?'text-red-400 font-bold':'text-gray-500'}">${fmtD(o.deadline)}${overdue?' ⚠️':''}</td>
          <td class="py-3 pr-4 font-bold text-white font-mono">${fmt(o.salePrice)}</td>
          <td class="py-3 pr-4"><span class="font-bold font-mono ${(o.profit||0)>=0?'text-emerald-400':'text-red-400'}">${fmt(o.profit)}</span><span class="text-xs text-gray-600 ml-1">(${o.margin||0}%)</span></td>
          <td class="py-3 pr-4"><p class="text-xs text-gray-500">${PAY_METHODS[o.paymentMethod]||''}</p><p class="text-xs font-semibold" style="color:${PAY_STATUS_MAP[o.paymentStatus]?.color||'#fff'}">${PAY_STATUS_MAP[o.paymentStatus]?.label||''}</p></td>
          <td class="py-3"><div class="row-actions flex gap-2" style="opacity:0;transition:opacity 0.15s"><button onclick="openOrderModal('${o.id}')" class="text-gray-600 hover:text-violet-400 transition"><i data-lucide="edit-2" class="w-3.5 h-3.5"></i></button><button onclick="deleteOrder('${o.id}')" class="text-gray-600 hover:text-red-400 transition"><i data-lucide="trash-2" class="w-3.5 h-3.5"></i></button></div></td>
        </tr>`;

function updateOrderCosts() {
  const f = editingOrder;
  const costs = calcCosts(f, state.settings, state.materials);
  const suggested = suggestPrice(f, state.settings, state.materials);
  const el = id => document.getElementById(id);
  if(el('cost-fil'))  el('cost-fil').textContent  = fmt(costs.filamentCost);
  if(el('cost-elec')) el('cost-elec').textContent = fmt(costs.electricityCost);
  if(el('cost-lab'))  el('cost-lab').textContent  = fmt(costs.laborCost);
  if(el('cost-total'))el('cost-total').textContent= fmt(costs.totalCost);
  if(el('cost-sug'))  { el('cost-sug').textContent=`Usar sugestão: ${fmt(suggested)}`; el('cost-sug').dataset.val=suggested; }
  if(el('profit-block')) {
    if(+f.salePrice>0) {
      el('profit-block').style.display='flex';
      el('profit-val').textContent=fmt(costs.profit);
      el('profit-val').style.color=costs.profit>=0?'#34d399':'#f87171';
      el('margin-val').textContent=costs.margin+'%';
      el('margin-val').style.color=costs.margin>=20?'#34d399':costs.margin>=0?'#fbbf24':'#f87171';

      el('profit-block').style.borderColor=costs.profit>=0?'rgba(52,211,153,0.2)':'rgba(248,113,113,0.2)';

  }
}

  const monthly=Array.from({length:12},(_,i)=>{
    const d=new Date(now.getFullYear(),now.getMonth()-(11-i),1);
    const mo=state.orders.filter(o=>{ const od=new Date((o.createdAt||today())+'T12:00:00'); return od.getMonth()===d.getMonth()&&od.getFullYear()===d.getFullYear()&&o.status==='entregue'; });
    return { name:MONTHS[d.getMonth()], fat:r2(mo.reduce((s,o)=>s+(o.salePrice||0),0)), cus:r2(mo.reduce((s,o)=>s+(o.totalCost||0),0)), luc:r2(mo.reduce((s,o)=>s+(o.profit||0),0)) };
  });
  const allDel=state.orders.filter(o=>o.status==='entregue');
  const totRev=allDel.reduce((s,o)=>s+(o.salePrice||0),0);
  const totCost=allDel.reduce((s,o)=>s+(o.totalCost||0),0);
  const getPeriod=pStr=>{ const [y,m]=pStr.split('-').map(Number); const mo=state.orders.filter(o=>{ const od=new Date((o.createdAt||today())+'T12:00:00'); return od.getMonth()===(m-1)&&od.getFullYear()===y; }); const del=mo.filter(o=>o.status==='entregue'); const rev=del.reduce((s,o)=>s+(o.salePrice||0),0), cost=del.reduce((s,o)=>s+(o.totalCost||0),0); return {total:mo.length,delivered:del.length,rev,cost,profit:rev-cost,margin:rev?r2(((rev-cost)/rev)*100):0}; };
  const fmtP=p=>{ const [y,m]=p.split('-').map(Number); return `${MONTHS[m-1]}/${y}`; };
  const pd1=getPeriod(finP1), pd2=getPeriod(finP2);

  const periodCard=(p,d)=>`<div class="bg-[#0f1219] border border-[#2a3045] rounded-xl p-4"><p class="font-bold text-white mb-3">${fmtP(p)}</p><div class="space-y-2 text-sm">
    <div class="flex justify-between"><span class="text-gray-500">Total de pedidos</span><span class="text-white">${d.total} (${d.delivered} entregues)</span></div>
    <div class="flex justify-between"><span class="text-gray-500">Faturamento</span><span class="text-violet-400 font-bold font-mono">${fmt(d.rev)}</span></div>
    <div class="flex justify-between"><span class="text-gray-500">Custos</span><span class="text-red-400 font-bold font-mono">${fmt(d.cost)}</span></div>
    <div class="flex justify-between pt-2 border-t border-[#2a3045]"><span class="text-gray-300 font-semibold">Lucro</span><span class="font-bold font-mono ${d.profit>=0?'text-emerald-400':'text-red-400'}">${fmt(d.profit)}</span></div>
    <div class="flex justify-between"><span class="text-gray-500">Margem</span><span class="text-white">${d.margin}%</span></div>
  </div></div>`;

  main.innerHTML = `
    <div class="flex items-center justify-between px-6 py-5 border-b border-[#1e2535]">
      <div><h1 class="text-lg font-bold text-white">Financeiro</h1><p class="text-xs text-gray-500 mt-0.5">Análise completa de faturamento e lucro</p></div>
    </div>
    <div class="grid grid-cols-3 gap-4 p-6 pb-4">
      ${[['Faturamento Total',fmt(totRev),'text-white',`${allDel.length} pedidos entregues`],['Custo Total',fmt(totCost),'text-red-400','Filamento + energia + mão de obra'],['Lucro Total',fmt(totRev-totCost),(totRev-totCost)>=0?'text-emerald-400':'text-red-400',`Margem ${totRev?r2(((totRev-totCost)/totRev)*100):0}%`]].map(([l,v,cls,sub])=>`
        <div class="bg-[#151926] border border-[#1e2535] rounded-2xl p-5">
          <p class="text-xs font-bold text-gray-600 uppercase tracking-widest mb-2">${l}</p>
          <p class="text-2xl font-bold font-mono ${cls}">${v}</p>
          <p class="text-xs text-gray-600 mt-1">${sub}</p>
        </div>`).join('')}
    </div>
    <div class="px-6 pb-4">
      <div class="bg-[#151926] border border-[#1e2535] rounded-2xl p-5">
        <p class="text-xs font-bold text-gray-600 uppercase tracking-widest mb-4">Faturamento, Custos e Lucro — Últimos 12 Meses</p>
        <div style="height:240px"><canvas id="chart-area"></canvas></div>
      </div>
    </div>
    <div class="px-6 pb-6">
      <div class="bg-[#151926] border border-[#1e2535] rounded-2xl p-5">
        <p class="text-xs font-bold text-gray-600 uppercase tracking-widest mb-4">Comparativo entre Períodos</p>
        <div class="flex gap-4 mb-5">
          <div><label class="text-xs text-gray-600 block mb-1 uppercase tracking-wider">Período 1</label>
            <input type="month" class="ic" style="width:180px" value="${finP1}" onchange="finP1=this.value;renderFinanceiro(document.getElementById('main-content'))"></div>
          <div><label class="text-xs text-gray-600 block mb-1 uppercase tracking-wider">Período 2</label>
            <input type="month" class="ic" style="width:180px" value="${finP2}" onchange="finP2=this.value;renderFinanceiro(document.getElementById('main-content'))"></div>
        </div>
        <div class="grid grid-cols-2 gap-4 mb-5">${periodCard(finP1,pd1)}${periodCard(finP2,pd2)}</div>
        <div style="height:200px"><canvas id="chart-cmp"></canvas></div>
      </div>
    </div>`;

  setTimeout(()=>{
    makeAreaChart('chart-area', monthly, [
      { label:'Faturamento', data:monthly.map(d=>d.fat), borderColor:'#7c3aed', backgroundColor:'rgba(124,58,237,0.15)', fill:true, tension:0.4, borderWidth:2 },
      { label:'Custos',      data:monthly.map(d=>d.cus), borderColor:'#ef4444', backgroundColor:'rgba(239,68,68,0.15)',   fill:true, tension:0.4, borderWidth:2 },
      { label:'Lucro',       data:monthly.map(d=>d.luc), borderColor:'#10b981', backgroundColor:'rgba(16,185,129,0.15)',  fill:true, tension:0.4, borderWidth:2 },
    ]);
    const cmpData = ['Faturamento','Custos','Lucro'];
    const cmpValues = [[pd1.rev,pd1.cost,pd1.profit],[pd2.rev,pd2.cost,pd2.profit]];
    destroyChart('chart-cmp');
    const ctx=document.getElementById('chart-cmp');
    if(ctx) charts['chart-cmp']=new Chart(ctx,{type:'bar',data:{labels:cmpData,datasets:[
      {label:fmtP(finP1),data:cmpValues[0],backgroundColor:'#7c3aed',borderRadius:4},
      {label:fmtP(finP2),data:cmpValues[1],backgroundColor:'#10b981',borderRadius:4},
    ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#6b7280',font:{size:11},usePointStyle:true,pointStyle:'circle'}}},scales:{x:{ticks:{color:'#4b5563'},grid:{color:'#1e2535'},border:{display:false}},y:{ticks:{color:'#4b5563',font:{size:10},callback:v=>v>=1000?`${(v/1e3).toFixed(1)}k`:v},grid:{color:'#1e2535'},border:{display:false}}}}});
  },50);
}

// ── SETTINGS ──────────────────────────────────────────────────────────────────
let editingSettings = null;
function renderSettings(main) {
  const f = editingSettings || {...state.settings};
  editingSettings = f;
  main.innerHTML = `
    <div class="flex items-center justify-between px-6 py-5 border-b border-[#1e2535]">
      <div><h1 class="text-lg font-bold text-white">Configurações</h1><p class="text-xs text-gray-500 mt-0.5">Custos padrão e preferências do sistema</p></div>
    </div>
    <div class="p-6 max-w-lg space-y-4">
      <div class="bg-[#151926] border border-[#1e2535] rounded-2xl p-5 space-y-4">
        <p class="text-xs font-bold text-gray-600 uppercase tracking-widest">⚙️ Custos Padrão</p>
        <div><label class="block text-xs font-semibold text-gray-500 mb-1.5 uppercase tracking-wider">Preço padrão do filamento (R$/kg)</label>
          <input type="number" class="ic" step="1" min="0" value="${f.filamentPerGram}" oninput="editingSettings.filamentPerGram=+this.value;updateSettingsFormula()">
          <p class="text-xs text-gray-600 mt-1">Usado quando o material não tem preço definido individualmente (ex: R$120 = R$0,12/g)</p></div>
        <div><label class="block text-xs font-semibold text-gray-500 mb-1.5 uppercase tracking-wider">Custo de energia elétrica (R$/hora de impressão)</label>
          <input type="number" class="ic" step="0.01" min="0" value="${f.electricityPerHour}" oninput="editingSettings.electricityPerHour=+this.value"></div>
        <div><label class="block text-xs font-semibold text-gray-500 mb-1.5 uppercase tracking-wider">Valor da sua hora de trabalho (R$/h)</label>
          <input type="number" class="ic" step="1" min="0" value="${f.laborPerHour}" oninput="editingSettings.laborPerHour=+this.value"></div>
        <div><label class="block text-xs font-semibold text-gray-500 mb-1.5 uppercase tracking-wider">Margem de lucro padrão (%)</label>
          <input type="number" class="ic" step="1" min="0" max="500" value="${f.defaultMargin}" oninput="editingSettings.defaultMargin=+this.value"></div>
      </div>
      <div class="bg-[#151926] border border-[#1e2535] rounded-2xl p-5">
        <p class="text-xs font-bold text-gray-600 uppercase tracking-widest mb-3">💡 Fórmula de Cálculo</p>
        <div class="space-y-2 text-sm text-gray-500">
          <p id="settings-formula">🧵 <span class="text-gray-300">Filamento:</span> Peso (g) × R$${(f.filamentPerGram/1000).toFixed(3)}/g  (= R$${f.filamentPerGram}/kg)</p>
          <p>⚡ <span class="text-gray-300">Energia:</span> Tempo impressão (h) × R$${f.electricityPerHour}/h</p>
          <p>👷 <span class="text-gray-300">Mão de obra:</span> Horas trabalhadas × R$${f.laborPerHour}/h</p>
          <p>🔄 <span class="text-gray-300">Falhas:</span> Valor manual por pedido</p>
          <p class="pt-2 border-t border-[#1e2535]">💰 <span class="text-gray-300">Preço sugerido</span> = Custo total × (1 + ${f.defaultMargin}%)</p>
        </div>
      </div>
      <div class="bg-[#151926] border border-[#1e2535] rounded-2xl p-5">
        <p class="text-xs font-bold text-gray-600 uppercase tracking-widest mb-3">💾 Dados Locais</p>
        <p class="text-xs text-gray-500 mb-3">Os dados são salvos automaticamente no localStorage do seu navegador.</p>
        <button onclick="exportData()" class="w-full bg-[#1e2535] hover:bg-[#262e42] text-gray-300 rounded-xl py-2.5 text-sm font-semibold transition mb-2">📤 Exportar dados (JSON)</button>
        <label class="block w-full bg-[#1e2535] hover:bg-[#262e42] text-gray-300 rounded-xl py-2.5 text-sm font-semibold transition text-center cursor-pointer">📥 Importar dados (JSON)<input type="file" accept=".json" class="hidden" onchange="importData(event)"></label>
      </div>
      <button onclick="saveSettings()" class="w-full bg-violet-600 hover:bg-violet-500 text-white rounded-xl py-3 font-bold text-sm transition">Salvar Configurações</button>
    </div>`;
}
function updateSettingsFormula() {
  const f = editingSettings;
  const el = document.getElementById("settings-formula");
  if(el) el.textContent = "Filamento: Peso (g) x R$" + (f.filamentPerGram/1000).toFixed(3) + "/g  (= R$" + f.filamentPerGram + "/kg)";
}
function saveSettings() { state.settings={...editingSettings}; editingSettings=null; saveAll(); alert('✅ Configurações salvas!'); }
function exportData() {
  const data=JSON.stringify({orders:state.orders,clients:state.clients,materials:state.materials,settings:state.settings},null,2);
  const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([data],{type:'application/json'})); a.download='print-manager-backup.json'; a.click();
}
function importData(e) {
  const f=e.target.files[0]; if(!f) return;
  const r=new FileReader(); r.onload=ev=>{ try{ const d=JSON.parse(ev.target.result); if(d.orders) state.orders=d.orders; if(d.clients) state.clients=d.clients; if(d.materials) state.materials=d.materials; if(d.settings) state.settings=d.settings; saveAll(); alert('✅ Dados importados!'); renderTab(); }catch{ alert('Arquivo inválido!'); } }; r.readAsText(f);
}

// ── MODAL ─────────────────────────────────────────────────────────────────────
function closeModal() { document.getElementById('modal').classList.add('hidden'); editingOrder=null; editingClient=null; editingMat=null; }
document.getElementById('modal').addEventListener('click',function(e){ if(e.target===this) closeModal(); });

// ── INIT ──────────────────────────────────────────────────────────────────────
document.querySelectorAll('.nav-btn').forEach(b=>{ b.addEventListener('click',()=>setTab(b.dataset.tab)); });
initFinPeriods();
state.orders    = stLoad(SK.o, []);
state.clients   = stLoad(SK.c, []);
state.materials = stLoad(SK.m, DEF_MATERIALS);
state.settings  = stLoad(SK.s, DEF_SETTINGS);
document.getElementById('loading').classList.add('hidden');
document.getElementById('app').classList.remove('hidden');
document.getElementById('app').style.display='flex';
setTab('dashboard');
</script>
</body>
</html>
